name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------------------------
  # 1. Verify CI passed for this commit
  # ---------------------------------------------------------------------------
  check-ci:
    name: Verify CI
    runs-on: ubuntu-latest
    steps:
      - name: Check CI workflow status
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const { data: ref } = await github.rest.git.getRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `tags/${tag}`
            });
            let sha = ref.object.sha;
            if (ref.object.type === 'tag') {
              const { data: tagObj } = await github.rest.git.getTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_sha: sha
              });
              sha = tagObj.object.sha;
              core.info(`Dereferenced annotated tag to commit ${sha}`);
            }
            core.info(`Tag ${tag} points to commit ${sha}`);

            const maxWait = 5 * 60 * 1000;
            const start = Date.now();
            let ciRun = null;

            while (Date.now() - start < maxWait) {
              const { data: runs } = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'ci.yml',
                head_sha: sha,
                per_page: 10
              });
              const ciRuns = runs.workflow_runs.filter(r => r.name === 'CI');
              ciRun = ciRuns[0] || null;
              if (ciRun) {
                core.info(`Found CI run ${ciRun.id}: status=${ciRun.status}, conclusion=${ciRun.conclusion}`);
              }
              if (ciRun && ciRun.status === 'completed') break;
              await new Promise(r => setTimeout(r, 15000));
            }

            if (!ciRun) {
              core.setFailed(`No CI run found for ${sha}`);
              return;
            }
            if (ciRun.conclusion !== 'success') {
              core.setFailed(`CI run ${ciRun.html_url} did not succeed (${ciRun.conclusion})`);
              return;
            }
            core.info(`CI passed: ${ciRun.html_url}`);

  # ---------------------------------------------------------------------------
  # 2. Build cross-platform release binaries
  # ---------------------------------------------------------------------------
  build:
    name: Build ${{ matrix.asset_name }}
    needs: check-ci
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: linux-x86_64
            artifact: camgrab
            archive: tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            asset_name: linux-arm64
            artifact: camgrab
            archive: tar.gz
            use_cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            asset_name: macos-x86_64
            artifact: camgrab
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: macos-arm64
            artifact: camgrab
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: windows-x86_64
            artifact: camgrab.exe
            archive: zip
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        if: ${{ !matrix.use_cross }}
        with:
          key: release-${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build
        shell: bash
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} -p camgrab-cli
          else
            cargo build --release --target ${{ matrix.target }} -p camgrab-cli
          fi

      - name: Extract version
        id: ver
        shell: bash
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          NAME="camgrab-v${{ steps.ver.outputs.version }}-${{ matrix.asset_name }}"
          mkdir "$NAME"
          cp "target/${{ matrix.target }}/release/${{ matrix.artifact }}" "$NAME/"
          cp LICENSE README.md "$NAME/"
          tar czf "$NAME.tar.gz" "$NAME"
          shasum -a 256 "$NAME.tar.gz" > "$NAME.tar.gz.sha256"

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $NAME = "camgrab-v${{ steps.ver.outputs.version }}-${{ matrix.asset_name }}"
          New-Item -ItemType Directory -Path $NAME
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.artifact }}" "$NAME/"
          Copy-Item LICENSE, README.md "$NAME/"
          Compress-Archive -Path "$NAME/*" -DestinationPath "$NAME.zip"
          $hash = (Get-FileHash "$NAME.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  $NAME.zip" | Out-File -FilePath "$NAME.zip.sha256" -Encoding ascii -NoNewline

      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.asset_name }}
          path: camgrab-v${{ steps.ver.outputs.version }}-${{ matrix.asset_name }}.*
          retention-days: 1

  # ---------------------------------------------------------------------------
  # 3. Create GitHub Release
  # ---------------------------------------------------------------------------
  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: ver
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Extract release notes from CHANGELOG.md
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          awk "/^## \[$VERSION\]/{found=1; next} /^## \[/{if(found) exit} found{print}" \
            CHANGELOG.md > release_notes.md

          if [ ! -s release_notes.md ]; then
            echo "Release v$VERSION" > release_notes.md
            echo "" >> release_notes.md
            echo "See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details." >> release_notes.md
          fi

      - name: Create SHA256SUMS
        run: cat artifacts/*.sha256 > artifacts/SHA256SUMS

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: camgrab v${{ steps.ver.outputs.version }}
          body_path: release_notes.md
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
            artifacts/*.sha256
            artifacts/SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # 4. Publish to crates.io (skipped if not configured)
  # ---------------------------------------------------------------------------
  publish-crate:
    name: Publish crates.io
    needs: release
    runs-on: ubuntu-latest
    if: vars.PUBLISH_CRATES == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish camgrab-core
        run: cargo publish -p camgrab-core || echo "Already published, skipping"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Wait for crates.io index
        run: sleep 30
      - name: Publish camgrab-daemon
        run: cargo publish -p camgrab-daemon || echo "Already published, skipping"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Publish camgrab-cli
        run: cargo publish -p camgrab-cli || echo "Already published, skipping"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # ---------------------------------------------------------------------------
  # 5. Update Homebrew tap (skipped if not configured)
  # ---------------------------------------------------------------------------
  publish-homebrew:
    name: Publish Homebrew
    needs: release
    runs-on: ubuntu-latest
    if: vars.PUBLISH_HOMEBREW == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: ver
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Download SHA256SUMS from release
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          gh release download "v${VERSION}" --pattern "*.sha256" --dir checksums
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate formula
        run: |
          VERSION="${{ steps.ver.outputs.version }}"

          # Extract pure sha256 hashes (cat avoids grep prepending filenames)
          SHA_DARWIN_ARM64=$(cat checksums/*macos-arm64*.sha256 | awk '{print $1}')
          SHA_DARWIN_X86=$(cat checksums/*macos-x86_64*.sha256 | awk '{print $1}')
          SHA_LINUX_ARM64=$(cat checksums/*linux-arm64*.sha256 | awk '{print $1}')
          SHA_LINUX_X86=$(cat checksums/*linux-x86_64*.sha256 | awk '{print $1}')

          echo "SHA256 checksums:"
          echo "  macos-arm64:  ${SHA_DARWIN_ARM64}"
          echo "  macos-x86_64: ${SHA_DARWIN_X86}"
          echo "  linux-arm64:  ${SHA_LINUX_ARM64}"
          echo "  linux-x86_64: ${SHA_LINUX_X86}"

          sed -e "s/version \"1.0.0\"/version \"${VERSION}\"/" \
              Formula/camgrab.rb > camgrab.rb.tmp

          python3 -c "
          with open('camgrab.rb.tmp') as f:
              content = f.read()
          shas = ['${SHA_DARWIN_ARM64}', '${SHA_DARWIN_X86}', '${SHA_LINUX_ARM64}', '${SHA_LINUX_X86}']
          for sha in shas:
              content = content.replace('PLACEHOLDER', sha, 1)
          with open('camgrab.rb', 'w') as f:
              f.write(content)
          "

          echo "Generated formula:"
          cat camgrab.rb

      - name: Push to Homebrew tap
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          REPO="${{ github.repository_owner }}/homebrew-tap"

          git clone "https://x-access-token:${{ secrets.HOMEBREW_TAP_TOKEN }}@github.com/${REPO}.git" tap

          mkdir -p tap/Formula
          cp camgrab.rb tap/Formula/camgrab.rb

          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/camgrab.rb
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update camgrab to v${VERSION}"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

  # ---------------------------------------------------------------------------
  # 6. Publish Docker images (skipped if not configured)
  # ---------------------------------------------------------------------------
  publish-docker:
    name: Publish Docker
    needs: release
    runs-on: ubuntu-latest
    if: vars.PUBLISH_DOCKER == 'true'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: ver
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: vars.DOCKER_USERNAME != ''
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.ver.outputs.version }}
            ghcr.io/${{ github.repository }}:latest
            ${{ vars.DOCKER_USERNAME != '' && format('{0}/camgrab:{1}', vars.DOCKER_USERNAME, steps.ver.outputs.version) || '' }}
            ${{ vars.DOCKER_USERNAME != '' && format('{0}/camgrab:latest', vars.DOCKER_USERNAME) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.title=camgrab
            org.opencontainers.image.description=CLI tool for RTSP camera capture, motion detection, and ONVIF management
            org.opencontainers.image.version=${{ steps.ver.outputs.version }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.licenses=MIT

  # ---------------------------------------------------------------------------
  # 7. Summary
  # ---------------------------------------------------------------------------
  summary:
    name: Summary
    needs: [release, publish-crate, publish-homebrew, publish-docker]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Report
        run: |
          echo "## Release Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ "${{ needs.release.result }}" = "success" ]; then
            echo "- GitHub Release: created" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- GitHub Release: ${{ needs.release.result }}" >> "$GITHUB_STEP_SUMMARY"
          fi

          for job in publish-crate publish-homebrew publish-docker; do
            result=""
            case "$job" in
              publish-crate)    result="${{ needs.publish-crate.result }}" ;;
              publish-homebrew) result="${{ needs.publish-homebrew.result }}" ;;
              publish-docker)   result="${{ needs.publish-docker.result }}" ;;
            esac
            channel="${job#publish-}"
            if [ "$result" = "success" ]; then
              echo "- $channel: published" >> "$GITHUB_STEP_SUMMARY"
            elif [ "$result" = "skipped" ]; then
              echo "- $channel: skipped (not configured)" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "- $channel: $result" >> "$GITHUB_STEP_SUMMARY"
            fi
          done
